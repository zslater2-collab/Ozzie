<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozzie</title>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --border:    #1e2330;
    --blue:      #4a9eff;
    --green:     #3dd68c;
    --red:       #ff5f5f;
    --yellow:    #f5c842;
    --muted:     #5a6275;
    --text:      #e8eaf0;
    --subtext:   #8b93a8;
    --card-bg:   #161a24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: var(--blue); }
  .date-badge {
    font-size: 11px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 4px; font-weight: 500;
  }
  .refresh-btn {
    background: none; border: 1px solid var(--border);
    color: var(--subtext); padding: 6px 14px; border-radius: 6px;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── Loading / error ── */
  .status {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Sections ── */
  .section { padding: 0 16px; margin-top: 24px; }
  .section-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
  }
  .section-market {
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--subtext);
    margin-left: auto;
  }
  .flag-count {
    font-size: 13px; font-weight: 700; color: var(--yellow);
  }
  .empty-section {
    color: var(--muted); font-size: 12px; padding: 12px 0;
    font-style: italic;
  }

  /* ── Cards ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--blue);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card.over  { border-color: var(--red); }
  .card.under { border-color: var(--blue); }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 12px;
  }
  .team-name { font-size: 20px; font-weight: 700; color: var(--text); }
  .signal-badge {
    font-size: 16px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .signal-badge.under { color: var(--blue); }
  .signal-badge.over  { color: var(--red); }
  .sigma {
    font-size: 11px; color: var(--blue); font-weight: 600;
    font-family: 'SF Mono', monospace; text-align: right; margin-top: 2px;
  }
  .sigma.over { color: var(--red); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; margin-bottom: 12px;
  }
  .meta-item label {
    display: block; font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
  }
  .meta-item span {
    font-size: 13px; font-weight: 600; color: var(--text);
  }

  /* ── Fair odds boxes ── */
  .odds-label {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .odds-grid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  }
  .odds-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 6px; text-align: center;
  }
  .odds-box .line {
    font-size: 10px; color: var(--muted); margin-bottom: 3px;
  }
  .odds-box .odds-val {
    font-size: 17px; font-weight: 800;
    font-family: 'SF Mono', monospace; color: var(--text);
  }

  /* ── Lineup confirmed ── */
  .lineup-row {
    display: flex; align-items: center; gap: 6px;
    margin-top: 12px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.green  { background: var(--green); }
  .dot.yellow { background: var(--yellow); }
  .lineup-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .lineup-label.green  { color: var(--green); }
  .lineup-label.yellow { color: var(--yellow); }

  /* ── Combined cards ── */
  .combined-teams {
    font-size: 18px; font-weight: 700; color: var(--text);
  }
  .combined-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0;
  }
  .pitcher-block label {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 2px;
  }
  .pitcher-block span { font-size: 13px; font-weight: 600; }
  .z-row {
    display: flex; gap: 16px; margin-top: 8px;
  }
  .z-item label {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 2px;
  }
  .z-item span { font-size: 13px; font-weight: 600; font-family: 'SF Mono', monospace; }

  /* ── HR props ── */
  .hr-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .hr-left .player { font-size: 16px; font-weight: 700; }
  .hr-left .hr-meta { font-size: 11px; color: var(--subtext); margin-top: 2px; }
  .hr-right { text-align: right; }
  .hr-right .odds-main { font-size: 20px; font-weight: 800; color: var(--yellow); }
  .hr-right .odds-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Game status bar ── */
  .game-bar {
    padding: 10px 16px; font-size: 11px; color: var(--muted);
    display: flex; gap: 16px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .game-item .complete { color: var(--green); }
  .game-item .pending  { color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">OZZIE</div>
    <div class="date-badge" id="date-badge">—</div>
  </div>
  <button class="refresh-btn" onclick="load()">↻ Refresh</button>
</div>

<div id="app">
  <div class="status">
    <div class="spinner"></div>
    Loading…
  </div>
</div>

<script>
async function load() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="status"><div class="spinner"></div>Loading…</div>';
  try {
    const r = await fetch('/api/picks');
    const d = await r.json();
    if (d.error) { app.innerHTML = `<div class="status">Error: ${d.error}</div>`; return; }
    render(d);
  } catch(e) {
    app.innerHTML = `<div class="status">Failed to load: ${e.message}</div>`;
  }
}

function fmt(val) {
  if (!val || val === 'N/A') return '—';
  return val;
}

function sigmaClass(z, signal) {
  return signal === 'over' ? 'over' : 'under';
}

function lineupStatus(complete) {
  return complete
    ? `<div class="lineup-row"><div class="dot green"></div><div class="lineup-label green">Lineup Confirmed</div></div>`
    : `<div class="lineup-row"><div class="dot yellow"></div><div class="lineup-label yellow">Lineup Pending</div></div>`;
}

function oddsGrid(fair_odds) {
  if (!fair_odds || !Object.keys(fair_odds).length) return '';
  const boxes = Object.entries(fair_odds).map(([line, odds]) => `
    <div class="odds-box">
      <div class="line">${line} runs</div>
      <div class="odds-val">${fmt(odds)}</div>
    </div>`).join('');
  return `
    <div class="odds-label">Fair Odds (Under)</div>
    <div class="odds-grid">${boxes}</div>`;
}

function renderF5Single(flags) {
  if (!flags.length) return '<div class="empty-section">No flags today</div>';
  return flags.map(f => `
    <div class="card ${f.signal}">
      <div class="card-top">
        <div class="team-name">${f.batting_team}</div>
        <div>
          <div class="signal-badge ${f.signal}">${f.signal.toUpperCase()}</div>
          <div class="sigma ${sigmaClass(f.std_from_mean, f.signal)}">${f.std_from_mean}σ from mean</div>
        </div>
      </div>
      <hr class="divider">
      <div class="meta-grid">
        <div class="meta-item"><label>vs Pitcher</label><span>${f.pitcher_name}</span></div>
        <div class="meta-item"><label>Throws</label><span>${f.pitcher_hand}HP</span></div>
        <div class="meta-item"><label>Overlap Score</label><span>${f.overlap_score}</span></div>
        <div class="meta-item"><label>Starter Avg IP</label><span>—</span></div>
        <div class="meta-item"><label>Batters Scored</label><span>${f.batters_scored} / 9</span></div>
      </div>
      ${oddsGrid(f.fair_odds)}
      ${lineupStatus(f.lineup_complete)}
    </div>`).join('');
}

function renderF5Combined(flags) {
  if (!flags.length) return '<div class="empty-section">No combined flags today</div>';
  return flags.map(f => `
    <div class="card under">
      <div class="card-top">
        <div class="combined-teams">${f.team_1} + ${f.team_2}</div>
        <div>
          <div class="signal-badge under">UNDER</div>
          <div class="sigma under">Σz = ${f.combined_z}</div>
        </div>
      </div>
      <hr class="divider">
      <div class="combined-meta">
        <div class="pitcher-block"><label>${f.team_1} Starter</label><span>${f.pitcher_1}</span></div>
        <div class="pitcher-block"><label>${f.team_2} Starter</label><span>${f.pitcher_2}</span></div>
      </div>
      <div class="z-row">
        <div class="z-item"><label>${f.team_1} z</label><span>${f.z_team_1}σ</span></div>
        <div class="z-item"><label>${f.team_2} z</label><span>${f.z_team_2}σ</span></div>
        <div class="z-item"><label>Avg Score</label><span>${f.avg_score}</span></div>
      </div>
      <hr class="divider">
      ${oddsGrid(f.fair_odds)}
      ${lineupStatus(f.lineup_complete)}
    </div>`).join('');
}

function renderFGSingle(flags) {
  if (!flags.length) return '<div class="empty-section">Full game model coming soon</div>';
  return flags.map(f => `
    <div class="card ${f.signal}">
      <div class="card-top">
        <div class="team-name">${f.batting_team}</div>
        <div>
          <div class="signal-badge ${f.signal}">${f.signal.toUpperCase()}</div>
          <div class="sigma ${sigmaClass(f.std_from_mean, f.signal)}">${f.std_from_mean}σ from mean</div>
        </div>
      </div>
      <hr class="divider">
      <div class="meta-grid">
        <div class="meta-item"><label>vs Pitcher</label><span>${f.pitcher_name}</span></div>
        <div class="meta-item"><label>Throws</label><span>${f.pitcher_hand}HP</span></div>
        <div class="meta-item"><label>Overlap Score</label><span>${f.overlap_score}</span></div>
        <div class="meta-item"><label>Batters Scored</label><span>${f.batters_scored} / 9</span></div>
      </div>
      ${oddsGrid(f.fair_odds)}
      ${lineupStatus(f.lineup_complete)}
    </div>`).join('');
}

function renderFGCombined(flags) {
  if (!flags.length) return '<div class="empty-section">Full game combined model coming soon</div>';
  return renderF5Combined(flags); // same structure, different odds lines
}

function renderHR(picks) {
  if (!picks.length) return '<div class="empty-section">No HR flags today</div>';
  return picks.map(p => `
    <div class="hr-card">
      <div class="hr-left">
        <div class="player">${p.player_name}</div>
        <div class="hr-meta">${p.batting_team} · vs ${p.pitcher_name} · ${p.arch_name}</div>
      </div>
      <div class="hr-right">
        <div class="odds-main">${fmt(p.hr_fair)}</div>
        <div class="odds-sub">TB3+ ${fmt(p.tb3_fair)}</div>
      </div>
    </div>`).join('');
}

function render(d) {
  document.getElementById('date-badge').textContent = d.date || '—';

  const gameBar = (d.games || []).map(g =>
    `<span class="game-item">
      <span class="${g.complete ? 'complete' : 'pending'}">${g.away}@${g.home}</span>
    </span>`).join('');

  const html = `
    <div class="game-bar">${gameBar || '<span>No games found</span>'}</div>

    <div class="section">
      <div class="section-header">
        <span class="flag-count">${(d.f5_combined||[]).length}</span>
        <span class="section-title">Combined F5</span>
        <span class="section-market">F5 Game Total Under</span>
      </div>
      ${renderF5Combined(d.f5_combined || [])}
    </div>

    <div class="section">
      <div class="section-header">
        <span class="flag-count">${(d.f5_single||[]).length}</span>
        <span class="section-title">Single Team F5</span>
        <span class="section-market">F5 Team Total Under</span>
      </div>
      ${renderF5Single(d.f5_single || [])}
    </div>

    <div class="section">
      <div class="section-header">
        <span class="flag-count">${(d.fg_combined||[]).length}</span>
        <span class="section-title">Combined Full Game</span>
        <span class="section-market">Game Total Under</span>
      </div>
      ${renderFGCombined(d.fg_combined || [])}
    </div>

    <div class="section">
      <div class="section-header">
        <span class="flag-count">${(d.fg_single||[]).length}</span>
        <span class="section-title">Single Team Full Game</span>
        <span class="section-market">Full Game Team Total Under</span>
      </div>
      ${renderFGSingle(d.fg_single || [])}
    </div>

    <div class="section">
      <div class="section-header">
        <span class="flag-count">${(d.hr_picks||[]).length}</span>
        <span class="section-title">HR Props</span>
        <span class="section-market">Home Run</span>
      </div>
      ${renderHR(d.hr_picks || [])}
    </div>`;

  document.getElementById('app').innerHTML = html;
}

load();
</script>
</body>
</html>
